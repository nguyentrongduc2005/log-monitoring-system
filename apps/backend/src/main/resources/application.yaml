spring:
  application:
    name: log-monitoring

  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      open-in-view: false
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql

